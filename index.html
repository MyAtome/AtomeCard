<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AtomA | Face Capture Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 30px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        h1 { color: #333; margin-bottom: 20px; }
        .camera-box {
            width: 250px;
            height: 250px;
            margin: 0 auto 20px;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid #FFD700;
            background: #000;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }
        input {
            padding: 12px;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 30px;
            margin-bottom: 15px;
            text-align: center;
        }
        button {
            background: #1a1a1a;
            color: #FFD700;
            border: 2px solid #FFD700;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin: 5px;
        }
        button:active { transform: scale(0.98); }
        .status {
            margin-top: 15px;
            padding: 10px;
            border-radius: 10px;
            font-size: 12px;
        }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }
        .logs {
            margin-top: 20px;
            text-align: left;
            background: #f4f4f4;
            padding: 10px;
            border-radius: 10px;
            font-size: 11px;
            max-height: 200px;
            overflow-y: auto;
        }
        .logs p { margin: 3px 0; font-family: monospace; }
    </style>
</head>
<body>
<div class="container">
    <h1>😊 Face Capture Test</h1>
    
    <div class="camera-box">
        <video id="video" autoplay playsinline></video>
    </div>
    
    <div>
        <input type="tel" id="phoneNumber" maxlength="10" placeholder="Enter 10-digit number" style="width: 80%;">
    </div>
    
    <div>
        <button id="captureBtn">📸 CAPTURE & SAVE</button>
        <button id="testFirebaseBtn">🔧 TEST FIREBASE</button>
    </div>
    
    <div id="status" class="status info">Ready to capture</div>
    
    <div class="logs">
        <strong>📋 Activity Log:</strong>
        <div id="logs"></div>
    </div>
</div>

<script type="module">
    // ============================================
    // SIMPLE FACE CAPTURE WITH FIREBASE
    // ============================================
    
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getStorage, ref as storageRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // Your Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyB2kK4XCKF2wN434O0On9gFHPdrYUJdsug",
        authDomain: "atomea-f9c0b.firebaseapp.com",
        databaseURL: "https://atomea-f9c0b-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "atomea-f9c0b",
        storageBucket: "atomea-f9c0b.firebasestorage.app",
        messagingSenderId: "41581075830",
        appId: "1:41581075830:web:f74f7f5fe27713c8feae57",
        measurementId: "G-7M7FYVHZEH"
    };

    // Initialize
    const app = initializeApp(firebaseConfig);
    const storage = getStorage(app);
    const db = getFirestore(app);
    
    let videoStream = null;
    const video = document.getElementById('video');
    const phoneInput = document.getElementById('phoneNumber');
    const captureBtn = document.getElementById('captureBtn');
    const testBtn = document.getElementById('testFirebaseBtn');
    const statusDiv = document.getElementById('status');
    const logsDiv = document.getElementById('logs');
    
    function addLog(message, type = 'info') {
        const logEntry = document.createElement('p');
        logEntry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
        logEntry.style.color = type === 'error' ? 'red' : (type === 'success' ? 'green' : 'black');
        logsDiv.appendChild(logEntry);
        logsDiv.scrollTop = logsDiv.scrollHeight;
        console.log(message);
        
        statusDiv.textContent = message;
        statusDiv.className = `status ${type === 'error' ? 'error' : (type === 'success' ? 'success' : 'info')}`;
    }
    
    // START CAMERA
    async function startCamera() {
        try {
            if (videoStream) videoStream.getTracks().forEach(t => t.stop());
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            videoStream = stream;
            video.srcObject = stream;
            addLog("✅ Camera started successfully", "success");
        } catch (err) {
            addLog("❌ Camera error: " + err.message, "error");
        }
    }
    
    // TEST FIREBASE CONNECTION
    async function testFirebase() {
        addLog("🔧 Testing Firebase connection...", "info");
        try {
            const testDoc = doc(db, "test", "connection");
            await setDoc(testDoc, {
                message: "Firestore is working!",
                timestamp: new Date().toISOString()
            });
            addLog("✅ Firestore connection SUCCESS!", "success");
            
            // Test Storage
            const testBlob = new Blob(["test"], { type: "text/plain" });
            const testRef = storageRef(storage, "test/test.txt");
            await uploadBytes(testRef, testBlob);
            addLog("✅ Storage connection SUCCESS!", "success");
            
        } catch (error) {
            addLog("❌ Firebase error: " + error.message, "error");
        }
    }
    
    // CAPTURE AND SAVE
    async function captureAndSave() {
        const phoneNumber = phoneInput.value.trim();
        
        if (!phoneNumber || phoneNumber.length !== 10 || phoneNumber[0] !== '9') {
            addLog("❌ Invalid phone number! Must be 10 digits starting with 9", "error");
            return;
        }
        
        addLog("📸 Capturing face...", "info");
        
        try {
            // Create canvas from video
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            if (canvas.width === 0) {
                addLog("❌ Camera not ready. Please wait.", "error");
                return;
            }
            
            const ctx = canvas.getContext('2d');
            ctx.save();
            ctx.scale(-1, 1);
            ctx.drawImage(video, -canvas.width, 0, canvas.width, canvas.height);
            ctx.restore();
            
            // Convert to JPEG
            const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.9));
            
            if (!blob) {
                addLog("❌ Failed to capture image", "error");
                return;
            }
            
            addLog(`📸 Image captured: ${(blob.size / 1024).toFixed(2)} KB`, "success");
            
            // Upload to Storage
            const fileName = `faces/${phoneNumber}_${Date.now()}.jpg`;
            const imageRef = storageRef(storage, fileName);
            
            addLog("📤 Uploading to Firebase Storage...", "info");
            await uploadBytes(imageRef, blob);
            const imageUrl = await getDownloadURL(imageRef);
            
            addLog("✅ Uploaded to Storage! URL: " + imageUrl.substring(0, 50) + "...", "success");
            
            // Save to Firestore
            addLog("💾 Saving to Firestore...", "info");
            
            const userDocRef = doc(db, "users", phoneNumber);
            await setDoc(userDocRef, {
                phoneNumber: phoneNumber,
                faceImageUrl: imageUrl,
                fileName: fileName,
                capturedAt: new Date().toISOString(),
                fileSize: blob.size,
                status: "success"
            });
            
            addLog("✅ SAVED TO FIRESTORE! Check your Firebase console.", "success");
            addLog(`📁 Document path: users/${phoneNumber}`, "success");
            
            // Verify
            const verifyDoc = await getDoc(userDocRef);
            if (verifyDoc.exists()) {
                addLog("✅ Verification: Data exists in Firestore!", "success");
            }
            
        } catch (error) {
            addLog("❌ Error: " + error.message, "error");
            console.error(error);
        }
    }
    
    // Event listeners
    captureBtn.addEventListener('click', captureAndSave);
    testBtn.addEventListener('click', testFirebase);
    
    // Start camera on load
    startCamera();
    
    // Phone input validation
    phoneInput.addEventListener('input', (e) => {
        let val = e.target.value.replace(/\D/g, '');
        if (val.length > 10) val = val.slice(0, 10);
        e.target.value = val;
    });
    
    addLog("🚀 App ready! Click 'TEST FIREBASE' first", "info");
</script>
</body>
</html>
