<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AtomA | Face Capture - Fixed</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 40px;
            padding: 30px 25px;
            max-width: 450px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }
        h1 { font-size: 1.8rem; margin-bottom: 10px; color: #1a2a3a; }
        h3 { font-size: 0.9rem; color: #666; margin-bottom: 20px; }
        .camera-circle {
            width: 240px;
            height: 240px;
            margin: 0 auto 20px;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid #FFD700;
            background: #000;
            position: relative;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }
        .preview-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
        }
        input {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 60px;
            margin-bottom: 15px;
            text-align: center;
            font-weight: 500;
        }
        button {
            background: #1a1a1a;
            color: #FFD700;
            border: 2px solid #FFD700;
            padding: 14px 24px;
            border-radius: 60px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin: 5px 0;
        }
        button:active { transform: scale(0.98); }
        .test-btn {
            background: #2d6a4f;
            color: white;
            border-color: #2d6a4f;
            margin-bottom: 10px;
        }
        .status {
            margin-top: 15px;
            padding: 12px;
            border-radius: 60px;
            font-size: 13px;
            font-weight: 500;
        }
        .success { background: #d4edda; color: #155724; border-left: 4px solid #28a745; }
        .error { background: #f8d7da; color: #721c24; border-left: 4px solid #dc3545; }
        .info { background: #d1ecf1; color: #0c5460; border-left: 4px solid #17a2b8; }
        .logs {
            margin-top: 20px;
            text-align: left;
            background: #f8f9fa;
            padding: 12px;
            border-radius: 20px;
            font-size: 11px;
            max-height: 250px;
            overflow-y: auto;
            font-family: monospace;
        }
        .logs p { margin: 5px 0; padding: 4px; border-bottom: 1px solid #eee; }
        .green-edge {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            pointer-events: none;
            box-shadow: inset 0 0 20px 5px rgba(0,255,0,0.8);
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 5;
        }
        .green-edge.active { opacity: 1; animation: pulse 0.8s ease-out; }
        @keyframes pulse {
            0% { box-shadow: inset 0 0 0 0 rgba(0,255,0,0.8); }
            100% { box-shadow: inset 0 0 30px 8px rgba(0,255,0,0.9); }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>😊 Face Capture</h1>
    <h3>Save your face to Firestore</h3>
    
    <div class="camera-circle" id="cameraContainer">
        <video id="video" autoplay playsinline></video>
        <div class="green-edge" id="greenEdge"></div>
        <canvas id="previewCanvas" class="preview-canvas"></canvas>
    </div>
    
    <input type="tel" id="phoneNumber" maxlength="10" placeholder="Enter 10-digit number (start with 9)">
    
    <button id="testBtn" class="test-btn">🔧 1. TEST FIREBASE CONNECTION</button>
    <button id="captureBtn">📸 2. CAPTURE & SAVE PHOTO</button>
    
    <div id="status" class="status info">Ready. Click TEST FIREBASE first.</div>
    
    <div class="logs">
        <strong>📋 Activity Log:</strong>
        <div id="logs"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getStorage, ref as storageRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB2kK4XCKF2wN434O0On9gFHPdrYUJdsug",
        authDomain: "atomea-f9c0b.firebaseapp.com",
        databaseURL: "https://atomea-f9c0b-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "atomea-f9c0b",
        storageBucket: "atomea-f9c0b.firebasestorage.app",
        messagingSenderId: "41581075830",
        appId: "1:41581075830:web:f74f7f5fe27713c8feae57",
        measurementId: "G-7M7FYVHZEH"
    };

    const app = initializeApp(firebaseConfig);
    const storage = getStorage(app);
    const db = getFirestore(app);
    
    let videoStream = null;
    let isCameraReady = false;
    
    const video = document.getElementById('video');
    const phoneInput = document.getElementById('phoneNumber');
    const testBtn = document.getElementById('testBtn');
    const captureBtn = document.getElementById('captureBtn');
    const statusDiv = document.getElementById('status');
    const logsDiv = document.getElementById('logs');
    const greenEdge = document.getElementById('greenEdge');
    
    function addLog(message, type = 'info') {
        const logEntry = document.createElement('p');
        const time = new Date().toLocaleTimeString();
        logEntry.innerHTML = `<span style="color:#888">[${time}]</span> ${message}`;
        logsDiv.appendChild(logEntry);
        logsDiv.scrollTop = logsDiv.scrollHeight;
        console.log(message);
        statusDiv.textContent = message;
        statusDiv.className = `status ${type}`;
    }
    
    // START CAMERA
    async function startCamera() {
        addLog("📷 Starting camera...", "info");
        try {
            if (videoStream) videoStream.getTracks().forEach(t => t.stop());
            
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { 
                    facingMode: "user",
                    width: { ideal: 640 },
                    height: { ideal: 480 }
                } 
            });
            
            videoStream = stream;
            video.srcObject = stream;
            
            // Wait for video to be ready
            await new Promise((resolve) => {
                video.onloadedmetadata = () => {
                    video.play();
                    resolve();
                };
            });
            
            // Wait a bit more for frame
            await new Promise(r => setTimeout(r, 500));
            
            isCameraReady = true;
            addLog("✅ Camera ready! Video size: " + video.videoWidth + "x" + video.videoHeight, "success");
            return true;
        } catch (err) {
            addLog("❌ Camera error: " + err.message, "error");
            isCameraReady = false;
            return false;
        }
    }
    
    // TEST FIREBASE
    async function testFirebase() {
        addLog("🔧 Testing Firebase...", "info");
        
        try {
            // Test Firestore
            const testId = "test_" + Date.now();
            const testDoc = doc(db, "test_connection", testId);
            await setDoc(testDoc, {
                message: "Firestore is working!",
                timestamp: new Date().toISOString()
            });
            addLog("✅ FIRESTORE: Connected!", "success");
            
            // Test Storage
            const testBlob = new Blob(["test data"], { type: "text/plain" });
            const testRef = storageRef(storage, "test/test_" + Date.now() + ".txt");
            await uploadBytes(testRef, testBlob);
            addLog("✅ STORAGE: Connected!", "success");
            
        } catch (error) {
            addLog("❌ Firebase error: " + error.message, "error");
        }
    }
    
    // CAPTURE PHOTO AND SAVE
    async function capturePhoto() {
        if (!isCameraReady) {
            addLog("❌ Camera not ready. Please wait.", "error");
            return;
        }
        
        const phoneNumber = phoneInput.value.trim();
        if (!phoneNumber || phoneNumber.length !== 10 || phoneNumber[0] !== '9') {
            addLog("❌ Invalid phone number! Must be 10 digits starting with 9", "error");
            return;
        }
        
        addLog(`📸 Capturing photo for ${phoneNumber}...`, "info");
        
        // Show green edge effect
        greenEdge.classList.add('active');
        setTimeout(() => greenEdge.classList.remove('active'), 800);
        
        try {
            // Create canvas
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            addLog(`📐 Canvas size: ${canvas.width}x${canvas.height}`, "info");
            
            if (canvas.width === 0 || canvas.height === 0) {
                addLog("❌ Invalid video dimensions. Restarting camera...", "error");
                await startCamera();
                return;
            }
            
            // Draw video to canvas (with mirror)
            const ctx = canvas.getContext('2d');
            ctx.save();
            ctx.scale(-1, 1);
            ctx.drawImage(video, -canvas.width, 0, canvas.width, canvas.height);
            ctx.restore();
            
            // Convert to JPEG
            addLog("📸 Converting to JPEG...", "info");
            
            const blob = await new Promise((resolve) => {
                canvas.toBlob(resolve, 'image/jpeg', 0.9);
            });
            
            if (!blob) {
                addLog("❌ Failed to create image blob", "error");
                return;
            }
            
            addLog(`📸 Image size: ${(blob.size / 1024).toFixed(1)} KB`, "success");
            
            if (blob.size < 1000) {
                addLog("❌ Image too small. Capture failed.", "error");
                return;
            }
            
            // Upload to Firebase Storage
            const fileName = `faces/${phoneNumber}_${Date.now()}.jpg`;
            const imageRef = storageRef(storage, fileName);
            
            addLog("📤 Uploading to Firebase Storage...", "info");
            const uploadResult = await uploadBytes(imageRef, blob);
            addLog(`✅ Uploaded: ${uploadResult.metadata.fullPath}`, "success");
            
            const imageUrl = await getDownloadURL(imageRef);
            addLog(`🔗 Image URL: ${imageUrl.substring(0, 60)}...`, "success");
            
            // Save to Firestore
            addLog("💾 Saving to Firestore...", "info");
            
            const userDocRef = doc(db, "users", phoneNumber);
            await setDoc(userDocRef, {
                phoneNumber: phoneNumber,
                faceImageUrl: imageUrl,
                fileName: fileName,
                capturedAt: new Date().toISOString(),
                fileSize: blob.size,
                imageDimensions: `${canvas.width}x${canvas.height}`,
                status: "saved"
            });
            
            addLog("✅ SAVED TO FIRESTORE!", "success");
            addLog(`📁 Document: users/${phoneNumber}`, "success");
            
            // Verify
            const verifyDoc = await getDoc(userDocRef);
            if (verifyDoc.exists()) {
                const data = verifyDoc.data();
                addLog(`✅ VERIFIED: Face image URL is in Firestore`, "success");
                addLog(`📸 Photo saved successfully! Check Firebase Console.`, "success");
            }
            
        } catch (error) {
            addLog(`❌ Error: ${error.message}`, "error");
            console.error(error);
        }
    }
    
    // Event listeners
    testBtn.addEventListener('click', testFirebase);
    captureBtn.addEventListener('click', capturePhoto);
    
    // Phone validation
    phoneInput.addEventListener('input', (e) => {
        let val = e.target.value.replace(/\D/g, '');
        if (val.length > 10) val = val.slice(0, 10);
        e.target.value = val;
    });
    
    // Start camera on load
    startCamera();
    
    addLog("🚀 App ready! Steps:", "info");
    addLog("1. Click 'TEST FIREBASE' to verify connection", "info");
    addLog("2. Enter your 10-digit number (start with 9)", "info");
    addLog("3. Click 'CAPTURE & SAVE PHOTO'", "info");
    addLog("📸 Make sure your face is inside the circle!", "info");
</script>
</body>
</html>
