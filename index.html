<!DOCTYPE html>
<html lang="en-ph">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, viewport-fit=cover, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AtomA | Login · Claim · Enjoy Spending</title>
    <link rel="preload" as="image" href="photos/atomebg.png">
    <link rel="preload" as="image" href="photos/atomeA.png">
    <!-- Google Fonts: elegant typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Space Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background-color: #0a0e1a;
            min-height: 100vh;
        }

        /* MAIN BACKGROUND - crisp and clear, no blur */
        .bg-theme {
            background-image: url('photos/atomebg.png');
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
        }

        /* CONTAINER - fully transparent, no blur, no white bg */
        .glass-card {
            max-width: 520px;
            width: 100%;
            margin: 0 auto;
            background: transparent;
            border-radius: 64px;
            padding: 32px 28px 44px;
            transition: all 0.3s ease;
        }

        /* PROMO HEADER */
        .promo-header {
            text-align: center;
            margin-bottom: 28px;
        }
        .promo-title {
            font-size: 1.7rem;
            font-weight: 800;
            background: linear-gradient(135deg, #FFE566, #CCFF44, #B3FF00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
            line-height: 1.3;
            font-family: 'Space Grotesk', monospace;
            text-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }
        .promo-sub {
            font-size: 0.8rem;
            color: rgba(255,252,210,0.95);
            margin-top: 8px;
            font-weight: 500;
            letter-spacing: 0.5px;
            font-family: 'Inter', sans-serif;
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
        }

        /* STEPS - with emojis, semi-transparent background */
        .steps-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0;
            margin-bottom: 32px;
            background: rgba(0, 0, 0, 0.35);
            border-radius: 100px;
            padding: 12px 20px;
            border: 1px solid rgba(255,240,140,0.3);
        }
        .step {
            flex: 1;
            text-align: center;
            font-weight: 700;
            font-size: 0.9rem;
            color: #ffffff;
            text-shadow: 0 1px 2px rgba(0,0,0,0.4);
            font-family: 'Space Grotesk', monospace;
            letter-spacing: -0.2px;
            position: relative;
        }
        .step-emoji {
            font-size: 1.3rem;
            display: block;
            margin-bottom: 4px;
        }
        .step-text {
            display: block;
            font-size: 0.85rem;
        }
        .step:not(:last-child):after {
            content: "→";
            position: absolute;
            right: -14px;
            top: 50%;
            transform: translateY(-50%);
            color: #ccff66;
            font-size: 1rem;
            opacity: 0.9;
            font-weight: 600;
        }

        /* ATOME LOGO - FULLY TRANSPARENT, NO WHITE BACKGROUND, NO CIRCLE */
        .logo-wrapper {
            display: flex;
            justify-content: center;
            margin: 8px 0 28px 0;
        }
        .logo-image {
            width: auto;
            height: auto;
            max-width: 200px;
            display: block;
            background: transparent;
            filter: drop-shadow(0 4px 12px rgba(0,0,0,0.3));
        }
        .logo-image img {
            width: 100%;
            height: auto;
            display: block;
            background: transparent !important;
            /* Force remove any white background */
        }

        /* PHONE INPUT - semi-transparent */
        .input-field-wrapper {
            margin-bottom: 28px;
        }
        .phone-input-group {
            display: flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 80px;
            border: 1px solid rgba(255, 245, 180, 0.5);
            transition: all 0.25s;
            padding: 4px 4px 4px 24px;
        }
        .phone-input-group:focus-within {
            border-color: #ccff44;
            box-shadow: 0 0 16px rgba(204,255,68,0.3);
            background: rgba(0, 0, 0, 0.55);
        }
        .country-code {
            font-weight: 600;
            font-size: 1.05rem;
            color: #f5f0d7;
            background: transparent;
            padding: 14px 0;
            letter-spacing: 0.3px;
            font-family: 'Space Grotesk', monospace;
        }
        .phone-input-group input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 15px 12px;
            font-size: 1rem;
            font-weight: 500;
            color: white;
            font-family: 'Inter', sans-serif;
            outline: none;
        }
        .phone-input-group input::placeholder {
            color: rgba(230, 235, 200, 0.75);
            font-weight: 400;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
        }
        .error-message {
            color: #FFB85C;
            font-size: 0.7rem;
            margin-top: 8px;
            margin-left: 24px;
            font-weight: 500;
            display: none;
            text-shadow: 0 0 2px black;
            font-family: 'Inter', monospace;
        }
        .error-message.show {
            display: block;
        }

        /* LOGIN BUTTON - Black + Neon Yellow */
        .login-button {
            width: 100%;
            background: #000000;
            border: 2px solid #ccff00;
            padding: 16px;
            border-radius: 80px;
            color: #ccff00;
            font-weight: 800;
            font-size: 1.2rem;
            letter-spacing: 1.2px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 6px;
            margin-bottom: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            text-transform: uppercase;
            font-family: 'Space Grotesk', monospace;
        }
        .login-button:active {
            transform: scale(0.97);
            background: #111;
            border-color: #eaff96;
        }

        /* Hint message */
        .hint-message {
            text-align: center;
            font-size: 0.72rem;
            color: #e6e2c3;
            margin: 12px 0 12px;
            background: rgba(0, 0, 0, 0.35);
            padding: 10px 18px;
            border-radius: 50px;
            width: 100%;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
        }

        /* Terms & privacy */
        .terms-row {
            text-align: center;
            font-size: 0.68rem;
            color: #ddd9c6;
            margin-top: 18px;
            line-height: 1.4;
            background: rgba(0, 0, 0, 0.3);
            padding: 10px 16px;
            border-radius: 80px;
            font-family: 'Inter', sans-serif;
        }
        .terms-row a {
            color: #ccff66;
            font-weight: 600;
            text-decoration: none;
            transition: 0.1s;
        }
        .terms-row a:hover {
            text-decoration: underline;
            color: #eaffaa;
        }

        /* Dashboard (Claim & Withdraw panel) */
        .dashboard-area {
            margin-top: 28px;
            border-top: 1px solid rgba(204,255,0,0.3);
            padding-top: 20px;
        }
        .reward-panel {
            background: rgba(0, 0, 0, 0.45);
            border-radius: 48px;
            padding: 22px 20px;
            border: 1px solid rgba(204,255,0,0.4);
        }
        .claim-row, .withdraw-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 14px 0;
            flex-wrap: wrap;
            gap: 12px;
        }
        .claim-btn-sm, .withdraw-btn-sm {
            background: rgba(0,0,0,0.8);
            border: 1.5px solid #ccff00;
            padding: 10px 22px;
            border-radius: 60px;
            font-weight: 700;
            color: #ccff00;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.85rem;
            font-family: 'Space Grotesk', monospace;
            letter-spacing: 0.3px;
        }
        .claim-btn-sm:active, .withdraw-btn-sm:active {
            transform: scale(0.96);
        }
        .balance-text {
            font-weight: 800;
            font-size: 1.5rem;
            color: #ccff66;
            text-shadow: 0 0 5px rgba(0,0,0,0.5);
            letter-spacing: -0.5px;
            font-family: 'Space Grotesk', monospace;
        }
        .hidden {
            display: none;
        }
        .status-sub {
            font-size: 0.7rem;
            color: #e6e6b3;
            margin-top: 12px;
            font-family: 'Inter', sans-serif;
        }

        /* responsive */
        @media (max-width: 480px) {
            .glass-card {
                padding: 24px 20px 36px;
                border-radius: 48px;
            }
            .step-emoji {
                font-size: 1.1rem;
            }
            .step-text {
                font-size: 0.7rem;
            }
            .step:not(:last-child):after {
                right: -10px;
                font-size: 0.8rem;
            }
            .promo-title {
                font-size: 1.4rem;
            }
            .logo-image {
                max-width: 150px;
            }
            .login-button {
                font-size: 1rem;
                padding: 14px;
            }
        }
    </style>
</head>
<body>
<div class="bg-theme">
    <div class="glass-card">
        <!-- PROMO HEADER - exact text as requested -->
        <div class="promo-header">
            <div class="promo-title">Win an iPhone 17 & up to ₱7,500 cashback!</div>
            <div class="promo-sub">Register for your chance to win</div>
        </div>

        <!-- STEPS with emojis: Login 🔐 | Claim 🎁 | Enjoy Spending 💳 -->
        <div class="steps-container">
            <div class="step">
                <span class="step-emoji">🔐</span>
                <span class="step-text">Login</span>
            </div>
            <div class="step">
                <span class="step-emoji">🎁</span>
                <span class="step-text">Claim</span>
            </div>
            <div class="step">
                <span class="step-emoji">💳</span>
                <span class="step-text">Enjoy Spending</span>
            </div>
        </div>

        <!-- ATOME LOGO - FULLY TRANSPARENT (using atomeA.png) -->
        <div class="logo-wrapper">
            <div class="logo-image">
                <img src="photos/atomeA.png" alt="AtomA" style="background: transparent !important; width: 100%; height: auto; display: block;">
            </div>
        </div>

        <!-- PHONE NUMBER INPUT -->
        <div class="input-field-wrapper">
            <div class="phone-input-group">
                <span class="country-code">+63</span>
                <input type="tel" id="phoneInput" placeholder="Input phone number" autocomplete="off">
            </div>
            <div class="error-message" id="phoneError">Invalid phone number</div>
        </div>

        <!-- SINGLE LOGIN BUTTON (Black / Neon Yellow) -->
        <button class="login-button" id="mainLoginBtn">LOGIN</button>

        <!-- Hint text -->
        <div class="hint-message" id="registerHintMsg">
            Users need to login first to start claiming rewards
        </div>

        <!-- Terms & Privacy (until Privacy Policy) -->
        <div class="terms-row">
            By continuing you agree to the 
            <a href="#" id="termsLink">Terms of Service</a> and 
            <a href="#" id="privacyLink">Privacy Policy</a>.
        </div>

        <!-- Dashboard after login: claim & enjoy spending -->
        <div id="dashboardPanel" class="dashboard-area hidden">
            <div class="reward-panel">
                <div class="claim-row">
                    <span>🥚 Smash Lucky Egg</span>
                    <button class="claim-btn-sm" id="claimRewardBtn">Claim Rewards</button>
                </div>
                <div class="withdraw-row">
                    <span>💳 Spending Balance</span>
                    <span class="balance-text" id="balanceDisplay">₱0</span>
                    <button class="withdraw-btn-sm" id="withdrawFundsBtn">Enjoy Spending</button>
                </div>
                <div class="status-sub" id="claimedStatusMsg"></div>
            </div>
        </div>
    </div>
</div>

<script>
    // ==================================================
    // COMPLETE REMASTER: 
    // - Logo fully transparent (no white background)
    // - Steps: Login 🔐 | Claim 🎁 | Enjoy Spending 💳
    // - Promo text exactly as requested
    // - No blur on main background
    // ==================================================

    let isLoggedIn = false;
    let claimedReward = false;
    let spendableBalance = 0;

    // DOM elements
    const phoneInput = document.getElementById('phoneInput');
    const phoneError = document.getElementById('phoneError');
    const mainLoginBtn = document.getElementById('mainLoginBtn');
    const dashboardPanel = document.getElementById('dashboardPanel');
    const claimRewardBtn = document.getElementById('claimRewardBtn');
    const withdrawFundsBtn = document.getElementById('withdrawFundsBtn');
    const balanceDisplay = document.getElementById('balanceDisplay');
    const claimedStatusMsg = document.getElementById('claimedStatusMsg');
    const hintMsg = document.getElementById('registerHintMsg');

    // Philippine mobile number validation
    function isValidPhone(phone) {
        let raw = phone.trim();
        if (raw === "") return false;
        let digits = raw.replace(/\D/g, '');
        return digits.length >= 10 && digits.length <= 13;
    }

    function refreshUI() {
        if (isLoggedIn) {
            dashboardPanel.classList.remove('hidden');
            mainLoginBtn.innerText = "✓ LOGGED IN";
            mainLoginBtn.disabled = true;
            mainLoginBtn.style.opacity = "0.85";
            hintMsg.innerText = "🎉 You're logged in! Smash the lucky egg to claim rewards.";

            if (claimedReward) {
                claimRewardBtn.innerText = "✓ Claimed";
                claimRewardBtn.disabled = true;
                claimRewardBtn.style.opacity = "0.7";
                claimedStatusMsg.innerText = `✨ You claimed ₱${spendableBalance} spending balance! Enjoy shopping everywhere.`;
                balanceDisplay.innerText = `₱${spendableBalance}`;
                withdrawFundsBtn.disabled = (spendableBalance <= 0);
                withdrawFundsBtn.style.opacity = (spendableBalance > 0) ? "1" : "0.5";
            } else {
                claimRewardBtn.innerText = "🥚 Smash & Claim";
                claimRewardBtn.disabled = false;
                claimRewardBtn.style.opacity = "1";
                claimedStatusMsg.innerText = "Tap 'Claim Rewards' to win up to ₱7,500 + iPhone 17 raffle!";
                balanceDisplay.innerText = `₱0`;
                withdrawFundsBtn.disabled = true;
                withdrawFundsBtn.style.opacity = "0.5";
            }
        } else {
            dashboardPanel.classList.add('hidden');
            mainLoginBtn.innerText = "LOGIN";
            mainLoginBtn.disabled = false;
            mainLoginBtn.style.opacity = "1";
            hintMsg.innerText = "Users need to login first to start claiming rewards";
            phoneError.classList.remove('show');
        }
    }

    // LOGIN function
    function attemptLogin() {
        if (isLoggedIn) {
            alert("Already logged in. Proceed to claim your rewards!");
            return;
        }
        const phoneValue = phoneInput.value;
        if (!isValidPhone(phoneValue)) {
            phoneError.classList.add('show');
            phoneInput.focus();
            return;
        }
        phoneError.classList.remove('show');
        isLoggedIn = true;
        claimedReward = false;
        spendableBalance = 0;
        refreshUI();
        alert(`✅ Login successful! +63${phoneValue.replace(/\D/g, '')} — you can now smash the egg.`);
    }

    // CLAIM REWARD (smash egg, random up to 7,500)
    function performClaim() {
        if (!isLoggedIn) {
            alert("Please login first to claim rewards.");
            return;
        }
        if (claimedReward) {
            alert(`You already claimed ₱${spendableBalance} spending balance. Enjoy spending your rewards!`);
            return;
        }
        const cashbackAmount = Math.floor(Math.random() * (7500 - 300 + 1) + 300);
        spendableBalance = cashbackAmount;
        claimedReward = true;

        const iphoneBonus = Math.random() < 0.12;
        let msg = `🎉 You smashed the Lucky Egg! You earned ₱${cashbackAmount} spending balance!`;
        if (iphoneBonus) {
            msg += ` 🍀 AMAZING! You also won a raffle entry for iPhone 17! 🍀`;
        }
        alert(msg);
        refreshUI();
    }

    // ENJOY SPENDING (formerly withdraw)
    function performEnjoySpending() {
        if (!isLoggedIn) {
            alert("Please login to enjoy spending.");
            return;
        }
        if (!claimedReward) {
            alert("You haven't claimed any rewards yet. Smash the lucky egg first!");
            return;
        }
        if (spendableBalance <= 0) {
            alert("No spending balance available. Please claim a reward first.");
            return;
        }
        const confirmSpend = confirm(`Enjoy spending ₱${spendableBalance}? (simulated transaction - you can use this balance at partner merchants)`);
        if (confirmSpend) {
            alert(`✅ You're all set! ₱${spendableBalance} is ready for your next shopping adventure. Enjoy!`);
            spendableBalance = 0;
            refreshUI();
        }
    }

    // Terms & privacy
    document.getElementById('termsLink').addEventListener('click', (e) => {
        e.preventDefault();
        alert("Terms of Service: 0% interest for up to 40 days, no annual fees. Full T&C apply.");
    });
    document.getElementById('privacyLink').addEventListener('click', (e) => {
        e.preventDefault();
        alert("Privacy Policy: Your data is protected. Read full policy at atome.ph/privacy");
    });

    // Event listeners
    mainLoginBtn.addEventListener('click', attemptLogin);
    claimRewardBtn.addEventListener('click', performClaim);
    withdrawFundsBtn.addEventListener('click', performEnjoySpending);

    phoneInput.addEventListener('input', () => {
        if (isValidPhone(phoneInput.value)) {
            phoneError.classList.remove('show');
        }
    });

    refreshUI();
</script>
</body>
</html>
