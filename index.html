<!DOCTYPE html>
<html lang="en-ph">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, viewport-fit=cover, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AtomA | Apply · Claim · Withdraw</title>
    <link rel="preload" as="image" href="photos/atomebg.png">
    <link rel="preload" as="image" href="photos/atomeA.jpg">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'SF Pro Text', Helvetica, Arial, sans-serif;
            background-color: #0a0e17;
            min-height: 100vh;
        }

        /* background image wrapper */
        .bg-theme {
            background-image: url('photos/atomebg.png');
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
        }

        /* GLASS TRANSPARENT CARD - remastered frosted glass effect */
        .glass-card {
            max-width: 500px;
            width: 100%;
            margin: 0 auto;
            background: rgba(15, 25, 35, 0.45);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-radius: 56px;
            border: 1px solid rgba(255, 255, 245, 0.25);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255,255,255,0.1);
            padding: 28px 24px 40px;
            transition: all 0.2s ease;
        }

        /* PROMO HEADER (Win iPhone 17 & cashback) */
        .promo-header {
            text-align: center;
            margin-bottom: 28px;
        }
        .promo-title {
            font-size: 1.65rem;
            font-weight: 800;
            background: linear-gradient(135deg, #FFE55C, #CCFF00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
            line-height: 1.3;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }
        .promo-sub {
            font-size: 0.75rem;
            color: rgba(255,250,210,0.9);
            margin-top: 6px;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        /* STEPS + LOGO combined row (icon beside steps) */
        .steps-with-icon {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            background: rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(8px);
            border-radius: 100px;
            padding: 8px 20px 8px 16px;
            margin-bottom: 32px;
            border: 1px solid rgba(255,240,160,0.3);
        }
        .steps-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex: 2;
            gap: 8px;
        }
        .step {
            text-align: center;
            flex: 1;
            font-weight: 700;
            font-size: 0.85rem;
            color: #ffffff;
            text-shadow: 0 1px 1px black;
            letter-spacing: 0.3px;
            position: relative;
        }
        .step-number {
            font-size: 0.65rem;
            opacity: 0.8;
            font-weight: 500;
            display: block;
            font-family: monospace;
        }
        .step:not(:last-child):after {
            content: "→";
            position: absolute;
            right: -12px;
            top: 50%;
            transform: translateY(-50%);
            color: #ccff00;
            font-size: 0.9rem;
            opacity: 0.9;
            text-shadow: 0 0 2px black;
        }
        /* logo icon placed here (atomeA.jpg transparent) */
        .icon-logo-sm {
            width: 52px;
            height: 52px;
            flex-shrink: 0;
            background: rgba(0,0,0,0.2);
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(2px);
            border: 1px solid rgba(255,215,0,0.4);
        }
        .icon-logo-sm img {
            width: 44px;
            height: 44px;
            object-fit: contain;
            display: block;
            background: transparent;
        }

        /* PHONE INPUT - glass transparent remaster */
        .input-glass {
            background: rgba(10, 20, 28, 0.55);
            backdrop-filter: blur(12px);
            border-radius: 80px;
            border: 1px solid rgba(255, 245, 180, 0.5);
            padding: 6px 6px 6px 24px;
            margin-bottom: 24px;
            transition: all 0.2s;
        }
        .input-glass:focus-within {
            border-color: #ccff00;
            box-shadow: 0 0 12px rgba(204,255,0,0.3);
            background: rgba(10, 20, 28, 0.7);
        }
        .phone-row {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: nowrap;
        }
        .country-code {
            font-weight: 700;
            font-size: 1.05rem;
            color: #f0f0e0;
            background: rgba(0,0,0,0.3);
            padding: 12px 0;
            letter-spacing: 0.5px;
        }
        .phone-row input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 16px 8px;
            font-size: 1rem;
            font-weight: 500;
            color: white;
            font-family: 'Inter', monospace;
            outline: none;
        }
        .phone-row input::placeholder {
            color: rgba(230, 240, 200, 0.7);
            font-weight: 400;
            font-size: 0.95rem;
        }
        .error-message {
            color: #FFB347;
            font-size: 0.7rem;
            margin-top: 6px;
            margin-left: 20px;
            font-weight: 500;
            display: none;
            text-shadow: 0 0 2px black;
            letter-spacing: 0.3px;
        }
        .error-message.show {
            display: block;
        }

        /* SINGLE BUTTON: Black + Neon Yellow text */
        .login-button {
            width: 100%;
            background: #000000;
            border: 2px solid #ccff00;
            padding: 16px;
            border-radius: 80px;
            color: #ccff00;
            font-weight: 800;
            font-size: 1.2rem;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 8px;
            margin-bottom: 20px;
            box-shadow: 0 10px 22px rgba(0,0,0,0.5);
            text-transform: uppercase;
            font-family: inherit;
        }
        .login-button:active {
            transform: scale(0.97);
            background: #111;
            border-color: #eaff96;
        }

        /* Hint text (login first to claim) */
        .hint-message {
            text-align: center;
            font-size: 0.72rem;
            color: #e6e2c3;
            margin: 12px 0 12px;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(8px);
            padding: 8px 16px;
            border-radius: 50px;
            width: 100%;
            font-weight: 500;
        }

        /* Terms & privacy glass style */
        .terms-row {
            text-align: center;
            font-size: 0.68rem;
            color: #ddd9c6;
            margin-top: 20px;
            line-height: 1.4;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(4px);
            padding: 10px 16px;
            border-radius: 80px;
        }
        .terms-row a {
            color: #ccff00;
            font-weight: 600;
            text-decoration: none;
        }
        .terms-row a:hover {
            text-decoration: underline;
        }

        /* Dashboard (Claim/Withdraw panel) */
        .dashboard-area {
            margin-top: 28px;
            border-top: 1px solid rgba(204,255,0,0.3);
            padding-top: 20px;
        }
        .reward-panel {
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(16px);
            border-radius: 44px;
            padding: 20px 18px;
            border: 1px solid rgba(204,255,0,0.4);
        }
        .claim-row, .withdraw-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 14px 0;
            flex-wrap: wrap;
            gap: 12px;
        }
        .claim-btn-sm, .withdraw-btn-sm {
            background: rgba(0,0,0,0.7);
            border: 1.5px solid #ccff00;
            padding: 10px 20px;
            border-radius: 60px;
            font-weight: 700;
            color: #ccff00;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.85rem;
            font-family: inherit;
        }
        .claim-btn-sm:active, .withdraw-btn-sm:active {
            transform: scale(0.96);
        }
        .balance-text {
            font-weight: 800;
            font-size: 1.4rem;
            color: #ccff00;
            text-shadow: 0 0 3px black;
            letter-spacing: -0.3px;
        }
        .hidden {
            display: none;
        }
        .status-sub {
            font-size: 0.7rem;
            color: #e6e6b3;
            margin-top: 12px;
        }

        /* responsive */
        @media (max-width: 480px) {
            .glass-card {
                padding: 20px 18px 32px;
            }
            .step {
                font-size: 0.7rem;
            }
            .step:not(:last-child):after {
                right: -10px;
                font-size: 0.75rem;
            }
            .promo-title {
                font-size: 1.35rem;
            }
            .icon-logo-sm {
                width: 44px;
                height: 44px;
            }
            .icon-logo-sm img {
                width: 38px;
                height: 38px;
            }
        }
    </style>
</head>
<body>
<div class="bg-theme">
    <div class="glass-card">
        <!-- Win iPhone 17 & up to ₱7,500 cashback! Register for your chance to win -->
        <div class="promo-header">
            <div class="promo-title">Win an iPhone 17 & up to ₱7,500 cashback!</div>
            <div class="promo-sub">Register for your chance to win</div>
        </div>

        <!-- STEPS (01 Apply / 02 Claim / 03 Withdraw) + atomeA.jpg icon beside it -->
        <div class="steps-with-icon">
            <div class="steps-group">
                <div class="step"><span class="step-number">01</span> Apply</div>
                <div class="step"><span class="step-number">02</span> Claim</div>
                <div class="step"><span class="step-number">03</span> Withdraw</div>
            </div>
            <div class="icon-logo-sm">
                <img src="photos/atomeA.jpg" alt="AtomA" style="background: transparent;">
            </div>
        </div>

        <!-- Glass input number form -->
        <div class="input-glass">
            <div class="phone-row">
                <span class="country-code">+63</span>
                <input type="tel" id="phoneInput" placeholder="Input phone number" autocomplete="off">
            </div>
            <div class="error-message" id="phoneError">Invalid phone number</div>
        </div>

        <!-- Single Login Button (Black + Neon Yellow) -->
        <button class="login-button" id="mainLoginBtn">LOGIN</button>

        <!-- Hint message (updated) -->
        <div class="hint-message" id="registerHintMsg">
            Users need to login first to start claiming rewards
        </div>

        <!-- Terms & Privacy (until Privacy Policy) -->
        <div class="terms-row">
            By continuing you agree to the 
            <a href="#" id="termsLink">Terms of Service</a> and 
            <a href="#" id="privacyLink">Privacy Policy</a>.
        </div>

        <!-- Dashboard after login (claim / withdraw) -->
        <div id="dashboardPanel" class="dashboard-area hidden">
            <div class="reward-panel">
                <div class="claim-row">
                    <span>🥚 Smash Lucky Egg</span>
                    <button class="claim-btn-sm" id="claimRewardBtn">Claim Rewards</button>
                </div>
                <div class="withdraw-row">
                    <span>💰 Withdrawable balance</span>
                    <span class="balance-text" id="balanceDisplay">₱0</span>
                    <button class="withdraw-btn-sm" id="withdrawFundsBtn">Withdraw</button>
                </div>
                <div class="status-sub" id="claimedStatusMsg"></div>
            </div>
        </div>
    </div>
</div>

<script>
    // ==================================================
    // REMASTERED: Glass UI, steps + logo inline, promo text
    // Only ONE login button. Apply/Claim/Withdraw as steps.
    // Login required for claim & withdraw. 
    // ==================================================

    let isLoggedIn = false;
    let claimedReward = false;
    let withdrawableCash = 0;

    // DOM elements
    const phoneInput = document.getElementById('phoneInput');
    const phoneError = document.getElementById('phoneError');
    const mainLoginBtn = document.getElementById('mainLoginBtn');
    const dashboardPanel = document.getElementById('dashboardPanel');
    const claimRewardBtn = document.getElementById('claimRewardBtn');
    const withdrawFundsBtn = document.getElementById('withdrawFundsBtn');
    const balanceDisplay = document.getElementById('balanceDisplay');
    const claimedStatusMsg = document.getElementById('claimedStatusMsg');
    const hintMsg = document.getElementById('registerHintMsg');

    // Philippine mobile validation (basic)
    function isValidPhone(phone) {
        let raw = phone.trim();
        if (raw === "") return false;
        let digits = raw.replace(/\D/g, '');
        return digits.length >= 10 && digits.length <= 13;
    }

    function refreshUI() {
        if (isLoggedIn) {
            dashboardPanel.classList.remove('hidden');
            mainLoginBtn.innerText = "✓ LOGGED IN";
            mainLoginBtn.disabled = true;
            mainLoginBtn.style.opacity = "0.85";
            hintMsg.innerText = "🎉 You're logged in! Smash the lucky egg to claim rewards.";

            if (claimedReward) {
                claimRewardBtn.innerText = "✓ Claimed";
                claimRewardBtn.disabled = true;
                claimRewardBtn.style.opacity = "0.7";
                claimedStatusMsg.innerText = `✨ You claimed ₱${withdrawableCash} cashback! Withdraw anytime.`;
                balanceDisplay.innerText = `₱${withdrawableCash}`;
                withdrawFundsBtn.disabled = (withdrawableCash <= 0);
                withdrawFundsBtn.style.opacity = (withdrawableCash > 0) ? "1" : "0.5";
            } else {
                claimRewardBtn.innerText = "🥚 Smash & Claim";
                claimRewardBtn.disabled = false;
                claimRewardBtn.style.opacity = "1";
                claimedStatusMsg.innerText = "Tap 'Claim Rewards' to win up to ₱7,500 + iPhone 17 raffle!";
                balanceDisplay.innerText = `₱0`;
                withdrawFundsBtn.disabled = true;
                withdrawFundsBtn.style.opacity = "0.5";
            }
        } else {
            dashboardPanel.classList.add('hidden');
            mainLoginBtn.innerText = "LOGIN";
            mainLoginBtn.disabled = false;
            mainLoginBtn.style.opacity = "1";
            hintMsg.innerText = "Users need to login first to start claiming rewards";
            phoneError.classList.remove('show');
        }
    }

    // LOGIN function
    function attemptLogin() {
        if (isLoggedIn) {
            alert("Already logged in. Proceed to claim your rewards!");
            return;
        }
        const phoneValue = phoneInput.value;
        if (!isValidPhone(phoneValue)) {
            phoneError.classList.add('show');
            phoneInput.focus();
            return;
        }
        phoneError.classList.remove('show');
        isLoggedIn = true;
        claimedReward = false;
        withdrawableCash = 0;
        refreshUI();
        alert(`✅ Login successful! +63${phoneValue.replace(/\D/g, '')} — you can now smash the egg.`);
    }

    // CLAIM REWARD (simulates smash egg, cashback up to 7,500 as per promo)
    function performClaim() {
        if (!isLoggedIn) {
            alert("Please login first to claim rewards.");
            return;
        }
        if (claimedReward) {
            alert(`You already claimed ₱${withdrawableCash}. Withdraw or wait for new event.`);
            return;
        }
        // random cashback between 300 and 7,500 (reflecting new promo)
        const cashbackAmount = Math.floor(Math.random() * (7500 - 300 + 1) + 300);
        withdrawableCash = cashbackAmount;
        claimedReward = true;

        const iphoneBonus = Math.random() < 0.12; // 12% chance for iphone 17 excitement
        let msg = `🎉 You smashed the Lucky Egg! You earned ₱${cashbackAmount} cashback!`;
        if (iphoneBonus) {
            msg += ` 🍀 AMAZING! You also won a raffle entry for iPhone 17! 🍀`;
        }
        alert(msg);
        refreshUI();
    }

    // WITHDRAW
    function performWithdraw() {
        if (!isLoggedIn) {
            alert("Please login to withdraw funds.");
            return;
        }
        if (!claimedReward) {
            alert("You haven't claimed any rewards yet. Smash the lucky egg first!");
            return;
        }
        if (withdrawableCash <= 0) {
            alert("No withdrawable balance. Please claim a reward first.");
            return;
        }
        const confirmWd = confirm(`Withdraw ₱${withdrawableCash} to your registered account? (simulated transaction)`);
        if (confirmWd) {
            alert(`✅ Withdrawal of ₱${withdrawableCash} successfully processed! Funds will be sent to your linked wallet.`);
            withdrawableCash = 0;
            refreshUI();
        }
    }

    // Terms & privacy (demo)
    document.getElementById('termsLink').addEventListener('click', (e) => {
        e.preventDefault();
        alert("Terms of Service: 0% interest for up to 40 days, no annual fees. Full T&C apply.");
    });
    document.getElementById('privacyLink').addEventListener('click', (e) => {
        e.preventDefault();
        alert("Privacy Policy: Your data is protected. Read full policy at atome.ph/privacy");
    });

    // event binding
    mainLoginBtn.addEventListener('click', attemptLogin);
    claimRewardBtn.addEventListener('click', performClaim);
    withdrawFundsBtn.addEventListener('click', performWithdraw);

    // hide error on input
    phoneInput.addEventListener('input', () => {
        if (isValidPhone(phoneInput.value)) {
            phoneError.classList.remove('show');
        }
    });

    refreshUI();
</script>
</body>
</html>
